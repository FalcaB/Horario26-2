<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>26-2 TEST</title>
<style>
:root {
  --bg: #eef4fb;
  --panel: rgba(255,255,255,.78);
  --panel-strong: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --border: rgba(148,163,184,.28);
  --shadow: 0 18px 60px rgba(15,23,42,.10);
  --header: linear-gradient(135deg, #2563eb, #7c3aed);
  --header-text: #ffffff;
  --grid-line: rgba(148,163,184,.18);
  --today: rgba(37,99,235,.08);
  --chip: rgba(255,255,255,.70);
  --chip-border: rgba(255,255,255,.35);
  --event-text: #ffffff;
  --danger: #ef4444;
  --radius: 22px;
  --hours-width: 92px;
  --day-width: 240px;
  --header-height: 60px;
  --hour-height: 60px;
}

body.dark {
  --bg: #0b1020;
  --panel: rgba(17,24,39,.72);
  --panel-strong: #111827;
  --text: #e5eefc;
  --muted: #9fb0c6;
  --border: rgba(148,163,184,.18);
  --shadow: 0 20px 70px rgba(0,0,0,.35);
  --header: linear-gradient(135deg, #1d4ed8, #6d28d9);
  --header-text: #f8fbff;
  --grid-line: rgba(148,163,184,.15);
  --today: rgba(59,130,246,.12);
  --chip: rgba(15,23,42,.55);
  --chip-border: rgba(148,163,184,.18);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(59,130,246,.12), transparent 32%),
    radial-gradient(circle at top right, rgba(124,58,237,.10), transparent 34%),
    linear-gradient(180deg, var(--bg), var(--bg));
  min-height: 100vh;
}

button, input { font: inherit; }

.app {
  max-width: 1720px;
  margin: 0 auto;
  padding: 22px;
}

.shell {
  display: grid;
  grid-template-rows: auto auto 1fr;
  gap: 16px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 16px 18px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  width: 42px;
  height: 42px;
  border-radius: 14px;
  background: var(--header);
  box-shadow: 0 14px 24px rgba(37,99,235,.22);
  display: grid;
  place-items: center;
  color: white;
  font-size: 20px;
  flex: 0 0 auto;
}

.title {
  margin: 0;
  font-size: clamp(22px, 3vw, 34px);
  line-height: 1.05;
  letter-spacing: -.03em;
}

.toolbar {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 10px;
}

.control {
  border: 1px solid var(--chip-border);
  background: var(--chip);
  color: var(--text);
  border-radius: 14px;
  padding: 11px 14px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(15,23,42,.08);
  transition: transform .18s ease, opacity .18s ease;
}

.control:hover { transform: translateY(-1px); }
.control.secondary { color: var(--muted); }

.search {
  min-width: min(340px, 70vw);
  display: flex;
  align-items: center;
  gap: 10px;
}

.search input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
}

.meta {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.card {
  padding: 16px 18px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.stat-label {
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .12em;
  font-weight: 700;
}

.stat-value {
  margin-top: 6px;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -.03em;
}

.stat-note {
  color: var(--muted);
  margin-top: 4px;
  font-size: 13px;
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--border);
  background: var(--panel);
  padding: 10px 12px;
  border-radius: 999px;
  box-shadow: var(--shadow);
  cursor: pointer;
  user-select: none;
  transition: transform .18s ease, opacity .18s ease, filter .18s ease;
}

.legend-item:hover { transform: translateY(-1px); }
.legend-item.off { opacity: .45; filter: grayscale(.25); }

.dot {
  width: 12px;
  height: 12px;
  border-radius: 999px;
  flex: 0 0 auto;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.28);
}

.main {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 16px;
  align-items: start;
}

.schedule-shell {
  position: relative;
  overflow: hidden;
  border-radius: calc(var(--radius) + 2px);
  border: 1px solid var(--border);
  background: var(--panel);
  box-shadow: var(--shadow);
  backdrop-filter: blur(16px);
}

.schedule-wrap {
  overflow: auto;
  max-height: min(78vh, 920px);
  position: relative;
}

.grid {
  position: relative;
  display: grid;
  grid-template-columns: var(--hours-width) repeat(5, var(--day-width));
  grid-template-rows: var(--header-height) repeat(14, var(--hour-height));
  min-width: calc(var(--hours-width) + 5 * var(--day-width));
}

.corner {
  position: sticky;
  left: 0;
  top: 0;
  z-index: 30;
  background: var(--header);
  color: white;
  border-right: 1px solid rgba(255,255,255,.08);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 12px 14px;
}

.corner strong {
  font-size: 14px;
  letter-spacing: .06em;
}

.corner span {
  font-size: 12px;
  opacity: .86;
  margin-top: 4px;
}

.day-head {
  position: sticky;
  top: 0;
  z-index: 25;
  background: var(--header);
  color: var(--header-text);
  border-left: 1px solid rgba(255,255,255,.08);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 10px 14px;
  font-weight: 800;
  letter-spacing: .01em;
}

.day-head.today {
  box-shadow: inset 0 -3px 0 rgba(255,255,255,.72);
}

.hour-label {
  position: sticky;
  left: 0;
  z-index: 20;
  background: color-mix(in srgb, var(--panel-strong) 92%, transparent);
  border-right: 1px solid var(--border);
  border-top: 1px solid var(--border);
  color: var(--muted);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 8px;
  font-size: 12px;
  font-weight: 700;
}

.cell {
  border-top: 1px solid var(--grid-line);
  border-left: 1px solid var(--grid-line);
  background: linear-gradient(to bottom, transparent 49%, rgba(148,163,184,.14) 50%, transparent 51%);
}

.cell.today { background-color: var(--today); }

.events-layer {
  position: absolute;
  left: var(--hours-width);
  top: var(--header-height);
  right: 0;
  bottom: 0;
  pointer-events: none;
}

.event {
  position: absolute;
  border-radius: 18px;
  color: var(--event-text);
  box-shadow: 0 14px 26px rgba(0,0,0,.16);
  overflow: hidden;
  pointer-events: auto;
  border: 1px solid rgba(255,255,255,.16);
  transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease, filter .18s ease;
}

.event:hover {
  transform: scale(1.015);
  box-shadow: 0 18px 34px rgba(0,0,0,.24);
  z-index: 50;
}

.event.disabled {
  opacity: .2;
  filter: grayscale(.4);
}

.event-inner {
  height: 100%;
  padding: 12px 12px 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 10px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0)),
    linear-gradient(135deg, var(--event-color), var(--event-color));
}

.event-title {
  font-weight: 800;
  font-size: 13px;
  line-height: 1.25;
}

.event-time {
  font-size: 12px;
  opacity: .94;
  display: flex;
  justify-content: space-between;
  gap: 8px;
  align-items: center;
}

.badge {
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 999px;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.16);
  width: fit-content;
}

.lab-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 999px;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.16);
  width: fit-content;
}

.line {
  position: absolute;
  left: var(--hours-width);
  right: 0;
  height: 2px;
  background: var(--danger);
  box-shadow: 0 0 0 1px rgba(255,255,255,.2), 0 0 18px rgba(239,68,68,.28);
  z-index: 45;
  pointer-events: none;
  display: none;
}

.line::before {
  content: "";
  position: absolute;
  left: -6px;
  top: -5px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--danger);
}

.tooltip {
  position: fixed;
  z-index: 200;
  pointer-events: none;
  max-width: 280px;
  background: rgba(15,23,42,.94);
  color: white;
  border-radius: 16px;
  padding: 12px 14px;
  box-shadow: 0 22px 60px rgba(0,0,0,.3);
  transform: translate(-50%, -120%);
  opacity: 0;
  transition: opacity .14s ease;
}

.tooltip .t-title {
  font-weight: 800;
  font-size: 14px;
  margin-bottom: 6px;
}

.tooltip .t-sub {
  font-size: 12px;
  opacity: .86;
  line-height: 1.45;
}

.sidebar {
  display: grid;
  gap: 16px;
}

.panel-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}

.panel-title h2 {
  margin: 0;
  font-size: 18px;
  letter-spacing: -.02em;
}

.subject-meta {
  color: var(--muted);
  font-size: 12px;
  margin-top: 4px;
}

.pill {
  font-size: 12px;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 7px 10px;
  border-radius: 999px;
  background: color-mix(in srgb, var(--panel) 80%, transparent);
}

.day-total {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--panel);
}

.day-total strong {
  font-size: 14px;
}

.day-total span {
  color: var(--muted);
  font-size: 12px;
}

@media (max-width: 1180px) {
  .main { grid-template-columns: 1fr; }
  .sidebar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

@media (max-width: 860px) {
  .app { padding: 14px; }
  .topbar { flex-direction: column; align-items: stretch; }
  .toolbar { justify-content: flex-start; width: 100%; }
  .search { min-width: 0; flex: 1 1 100%; }
  :root { --hours-width: 74px; --day-width: 176px; --hour-height: 60px; }
  .sidebar { grid-template-columns: 1fr; }
}

@media print {
  body { background: white !important; }
  .toolbar, .sidebar { display: none !important; }
  .app { max-width: none; padding: 0; }
  .topbar, .card, .schedule-shell { box-shadow: none !important; background: white !important; }
  .schedule-wrap { max-height: none !important; overflow: visible !important; }
}
</style>
</head>
<body>
<div class="app">
  <div class="shell">
    <section class="topbar">
      <div class="brand">
        <div class="logo">⌁</div>
        <h1 class="title">26-2</h1>
      </div>
      <div class="toolbar">
        <label class="control search" title="Buscar materia">
          🔎
          <input id="search" type="text" placeholder="Buscar materia..." />
        </label>
        <button class="control" id="toggleTheme">🌙 Modo</button>
        <button class="control secondary" id="centerToday">Hoy</button>
      </div>
    </section>

    <section class="meta">
      <div class="card">
        <div class="stat-label" id="nextClassLabel">Próxima clase</div>
        <div class="stat-value" id="nextClassTitle">—</div>
        <div class="stat-note" id="nextClassMeta">—</div>
      </div>
    </section>

    <div class="main">
      <section class="schedule-shell">
        <div class="schedule-wrap" id="scheduleWrap">
          <div class="grid" id="grid"></div>
          <div class="events-layer" id="eventsLayer"></div>
          <div class="line" id="nowLine"></div>
        </div>
      </section>

      <aside class="sidebar">
        <div class="card">
          <div class="panel-title">
            <h2>Materias</h2>
            <div class="pill" id="visibleCount">0 visibles</div>
          </div>
          <div class="legend" id="legend"></div>
        </div>

        <div class="card">
          <div class="panel-title">
            <h2>Horas por día</h2>
          </div>
          <div class="list" id="dayTotals"></div>
        </div>
      </aside>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
(() => {
  const subjects = [{"name": "Teoría de Teletráfico", "color": "#ef4444", "sessions": [{"type": "Clase", "day": "Wednesday", "startTime": "10:00", "endTime": "12:00", "zoomLink": ""}, {"type": "Clase", "day": "Friday", "startTime": "10:00", "endTime": "12:00", "zoomLink": ""}]}, {"name": "Electromagnetismo", "color": "#7c3aed", "sessions": [{"type": "Clase", "day": "Monday", "startTime": "14:00", "endTime": "16:00", "zoomLink": ""}, {"type": "Clase", "day": "Thursday", "startTime": "14:00", "endTime": "16:00", "zoomLink": ""}]}, {"name": "Física del Estado Sólido", "color": "#f97316", "sessions": [{"type": "Clase", "day": "Wednesday", "startTime": "14:00", "endTime": "16:00", "zoomLink": ""}, {"type": "Clase", "day": "Friday", "startTime": "14:00", "endTime": "16:00", "zoomLink": ""}]}, {"name": "Fundamentos Electrónica Análoga", "color": "#0ea5e9", "sessions": [{"type": "Clase", "day": "Tuesday", "startTime": "12:00", "endTime": "14:00", "zoomLink": ""}, {"type": "Clase", "day": "Thursday", "startTime": "12:00", "endTime": "14:00", "zoomLink": ""}, {"type": "LAB", "day": "Tuesday", "startTime": "15:00", "endTime": "18:00", "zoomLink": ""}]}, {"name": "Tratamiento de Señales I", "color": "#eab308", "sessions": [{"type": "Clase", "day": "Tuesday", "startTime": "10:00", "endTime": "12:00", "zoomLink": ""}, {"type": "Clase", "day": "Thursday", "startTime": "10:00", "endTime": "12:00", "zoomLink": ""}, {"type": "LAB", "day": "Monday", "startTime": "06:00", "endTime": "09:00", "zoomLink": ""}]}, {"name": "Redes de Computadores I", "color": "#22c55e", "sessions": [{"type": "Clase", "day": "Tuesday", "startTime": "06:00", "endTime": "08:00", "zoomLink": ""}, {"type": "Clase", "day": "Thursday", "startTime": "06:00", "endTime": "08:00", "zoomLink": ""}]}];

  const DAYS = [
    { id: "Monday", label: "Lunes" },
    { id: "Tuesday", label: "Martes" },
    { id: "Wednesday", label: "Miércoles" },
    { id: "Thursday", label: "Jueves" },
    { id: "Friday", label: "Viernes" },
  ];

  const DAY_INDEX = Object.fromEntries(DAYS.map((d, i) => [d.id, i]));
  const START_HOUR = 6;
  const END_HOUR = 20;
  const HOUR_HEIGHT = 60;
  const HEADER_HEIGHT = 60;
  const PX_PER_MIN = HOUR_HEIGHT / 60;
  const storageKey = 'schedule-ui-v4';

  const grid = document.getElementById('grid');
  const eventsLayer = document.getElementById('eventsLayer');
  const legend = document.getElementById('legend');
  const tooltip = document.getElementById('tooltip');
  const nowLine = document.getElementById('nowLine');
  const scheduleWrap = document.getElementById('scheduleWrap');
  const toggleThemeBtn = document.getElementById('toggleTheme');
  const centerTodayBtn = document.getElementById('centerToday');
  const search = document.getElementById('search');
  const nextClassLabel = document.getElementById('nextClassLabel');
  const nextClassTitle = document.getElementById('nextClassTitle');
  const nextClassMeta = document.getElementById('nextClassMeta');
  const visibleCount = document.getElementById('visibleCount');
  const dayTotals = document.getElementById('dayTotals');

  let state = {
    query: '',
    hiddenSubjects: new Set(),
    theme: 'light'
  };

  function toMinutes(time) {
    const [h, m] = time.split(':').map(Number);
    return h * 60 + m;
  }

  function durationHours(start, end) {
    return (end - start) / 60;
  }

  function dayLabel(dayId) {
    return DAYS.find(d => d.id === dayId)?.label ?? dayId;
  }

  function dayIndex(dayId) {
    return DAY_INDEX[dayId];
  }

  function fmtStartCountdown(diffMinutes) {
    if (diffMinutes <= 0) return "Empieza ahora";
    if (diffMinutes < 60) return `Empieza en ${diffMinutes} min`;
    const hoursLeft = Math.floor(diffMinutes / 60);
    const minsLeft = diffMinutes % 60;
    if (minsLeft === 0) return `Empieza en ${hoursLeft} h`;
    return `Empieza en ${hoursLeft} h ${minsLeft} min`;
  }

  function fmtEndCountdown(diffMinutes) {
    if (diffMinutes <= 0) return "ahora";
    if (diffMinutes < 60) return `${diffMinutes} min`;
    const hoursLeft = Math.floor(diffMinutes / 60);
    const minsLeft = diffMinutes % 60;
    if (minsLeft === 0) return `${hoursLeft} h`;
    return `${hoursLeft} h ${minsLeft} min`;
  }

  function subjectSessions() {
    const q = state.query.trim().toLowerCase();
    const sessions = [];
    subjects.forEach(subject => {
      subject.sessions.forEach(session => {
        const matches = !q || [subject.name, session.type, dayLabel(session.day), session.startTime, session.endTime].join(' ').toLowerCase().includes(q);
        const visible = !state.hiddenSubjects.has(subject.name);
        if (visible && matches) {
          sessions.push({
            subject: subject.name,
            color: subject.color,
            type: session.type,
            day: session.day,
            startTime: session.startTime,
            endTime: session.endTime,
            zoomLink: session.zoomLink || ""
          });
        }
      });
    });
    return sessions;
  }

  function buildGrid() {
    grid.innerHTML = '';
    const corner = document.createElement('div');
    corner.className = 'corner';
    corner.innerHTML = '<strong>Hora</strong><span>Semana</span>';
    grid.appendChild(corner);

    DAYS.forEach(day => {
      const el = document.createElement('div');
      el.className = 'day-head';
      el.dataset.day = day.id;
      el.textContent = day.label;
      grid.appendChild(el);
    });

    for (let h = START_HOUR; h < END_HOUR; h++) {
      const hour = document.createElement('div');
      hour.className = 'hour-label';
      hour.textContent = String(h).padStart(2, '0') + ':00';
      grid.appendChild(hour);

      for (let i = 0; i < DAYS.length; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.day = DAYS[i].id;
        grid.appendChild(cell);
      }
    }
  }

  function collectLegend() {
    legend.innerHTML = '';
    const items = subjects.slice().sort((a, b) => a.name.localeCompare(b.name, 'es'));

    items.forEach(subject => {
      const count = subject.sessions.length;
      const hours = subject.sessions.reduce((acc, s) => acc + (toMinutes(s.endTime) - toMinutes(s.startTime)), 0) / 60;
      const item = document.createElement('button');
      item.className = 'legend-item';
      item.type = 'button';
      item.dataset.subject = subject.name;
      item.innerHTML = `
        <span class="dot" style="background:${subject.color}"></span>
        <span style="display:flex;flex-direction:column;align-items:flex-start;min-width:0">
          <span style="font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px">${subject.name}</span>
          <span class="subject-meta">${count} sesión(es) · ${hours.toFixed(1)} h</span>
        </span>
      `;
      item.addEventListener('click', () => {
        if (state.hiddenSubjects.has(subject.name)) state.hiddenSubjects.delete(subject.name);
        else state.hiddenSubjects.add(subject.name);
        renderAll();
        saveState();
      });
      legend.appendChild(item);
    });
  }

  function groupedSessions() {
    const byDay = Object.fromEntries(DAYS.map(d => [d.id, []]));
    subjectSessions().forEach(s => byDay[s.day].push(s));
    return byDay;
  }

  function layoutCluster(cluster, dayColumn) {
    const sorted = cluster.slice().sort((a, b) => toMinutes(a.startTime) - toMinutes(b.startTime));
    const columns = [];
    const placed = [];

    for (const ev of sorted) {
      const s = toMinutes(ev.startTime);
      const e = toMinutes(ev.endTime);
      let col = 0;
      while (true) {
        if (!columns[col]) {
          columns[col] = [];
          break;
        }
        const collision = columns[col].some(x => !(e <= x.s || s >= x.e));
        if (!collision) break;
        col += 1;
      }
      columns[col].push({ ...ev, s, e });
      placed.push({ ...ev, s, e, col });
    }

    const colCount = Math.max(...placed.map(p => p.col), 0) + 1;
    return placed.map(p => ({
      ...p,
      dayColumn,
      colCount
    }));
  }

  function buildLayouts() {
    const layouts = [];
    const byDay = groupedSessions();

    DAYS.forEach((day, index) => {
      const list = byDay[day.id].slice().sort((a, b) => toMinutes(a.startTime) - toMinutes(b.startTime));
      let cluster = [];
      let clusterEnd = -1;

      const flush = () => {
        if (!cluster.length) return;
        layouts.push(...layoutCluster(cluster, index));
        cluster = [];
        clusterEnd = -1;
      };

      list.forEach(ev => {
        const s = toMinutes(ev.startTime);
        const e = toMinutes(ev.endTime);
        if (!cluster.length) {
          cluster = [ev];
          clusterEnd = e;
          return;
        }
        if (s < clusterEnd) {
          cluster.push(ev);
          clusterEnd = Math.max(clusterEnd, e);
        } else {
          flush();
          cluster = [ev];
          clusterEnd = e;
        }
      });
      flush();
    });

    return layouts;
  }

  function renderEvents() {
    eventsLayer.innerHTML = '';
    const layouts = buildLayouts();

    layouts.forEach(ev => {
      const card = document.createElement('div');
      card.className = 'event';
      card.style.setProperty('--event-color', ev.color);
      card.style.left = `calc(${ev.dayColumn} * var(--day-width) + 10px)`;
      card.style.top = `${(ev.s - START_HOUR * 60) * PX_PER_MIN}px`;
      card.style.width = `calc((var(--day-width) - 20px) / ${ev.colCount} - 6px)`;
      card.style.height = `${Math.max((ev.e - ev.s) * PX_PER_MIN - 6, 28)}px`;
      card.style.transform = `translateX(calc(${ev.col} * (100% + 8px)))`;

      card.innerHTML = `
        <div class="event-inner">
          <div>
            <div class="badge">${dayLabel(ev.day)}</div>
            <div class="event-title">${ev.subject}</div>
            ${ev.type === 'LAB' ? '<div class="lab-tag">LAB</div>' : ''}
          </div>
          <div class="event-time">
            <span>${ev.startTime} – ${ev.endTime}</span>
            <span>${durationHours(ev.s, ev.e).toFixed(1)} h</span>
          </div>
        </div>
      `;

      card.addEventListener('mouseenter', (e) => showTooltip(e, ev));
      card.addEventListener('mousemove', (e) => moveTooltip(e));
      card.addEventListener('mouseleave', hideTooltip);

      card.addEventListener('click', () => {
        const zoom = ev.zoomLink ? `\nZoom: ${ev.zoomLink}` : '\nZoom: próximamente';
        alert(`${ev.subject}\n${dayLabel(ev.day)} ${ev.startTime}–${ev.endTime}${zoom}`);
      });

      eventsLayer.appendChild(card);
    });
  }

  function showTooltip(e, ev) {
    tooltip.innerHTML = `
      <div class="t-title">${ev.subject}${ev.type === 'LAB' ? ' · LAB' : ''}</div>
      <div class="t-sub">
        Día: ${dayLabel(ev.day)}<br>
        Hora: ${ev.startTime} – ${ev.endTime}<br>
        Duración: ${durationHours(toMinutes(ev.startTime), toMinutes(ev.endTime)).toFixed(1)} horas<br>
        Zoom: próximamente
      </div>
    `;
    tooltip.style.opacity = '1';
    moveTooltip(e);
  }

  function moveTooltip(e) {
    const x = Math.min(window.innerWidth - 140, Math.max(140, e.clientX));
    const y = Math.max(80, e.clientY);
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }

  function hideTooltip() {
    tooltip.style.opacity = '0';
  }

  function currentDayId() {
    const map = [null, 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    return map[new Date().getDay()];
  }

  function updateDayHighlights() {
    const today = currentDayId();
    grid.querySelectorAll('.day-head').forEach(el => {
      el.classList.toggle('today', el.dataset.day === today);
    });
    grid.querySelectorAll('.cell').forEach(el => {
      el.classList.toggle('today', el.dataset.day === today);
    });
  }

  function updateNowLine() {
    const now = new Date();
    const todayId = currentDayId();
    const todayIdx = dayIndex(todayId);
    const mins = now.getHours() * 60 + now.getMinutes();
    const within = todayIdx !== undefined && mins >= START_HOUR * 60 && mins <= END_HOUR * 60;

    if (!within) {
      nowLine.style.display = 'none';
      return;
    }

    const dayWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--day-width'));
    const hoursWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--hours-width'));

    nowLine.style.display = 'block';
    nowLine.style.top = `calc(${HEADER_HEIGHT}px + ${(mins - START_HOUR * 60) * PX_PER_MIN}px)`;
    nowLine.style.left = `${hoursWidth + (todayIdx * dayWidth)}px`;
    nowLine.style.width = `${dayWidth}px`;
    nowLine.dataset.time = now.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', hour12: false });
  }

  function nextClass() {
    const now = new Date();
    const map = [null, 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    const todayId = map[now.getDay()];
    const todayIdx = dayIndex(todayId);
    const nowMinutes = now.getHours() * 60 + now.getMinutes();

    const visible = subjectSessions();
    const enriched = visible
      .map(ev => {
        const start = toMinutes(ev.startTime);
        const end = toMinutes(ev.endTime);
        const dayDelta = ((dayIndex(ev.day) ?? 99) - (todayIdx ?? 99) + 7) % 7;
        return { ...ev, start, end, dayDelta };
      })
      .filter(ev => dayIndex(ev.day) !== undefined)
      .sort((a, b) => {
        if (a.dayDelta !== b.dayDelta) return a.dayDelta - b.dayDelta;
        return a.start - b.start;
      });

    const current = enriched.find(ev => ev.dayDelta === 0 && nowMinutes >= ev.start && nowMinutes < ev.end);
    const futureToday = enriched.filter(ev => ev.dayDelta === 0 && ev.start >= nowMinutes).sort((a, b) => a.start - b.start);
    const futureDays = enriched.filter(ev => ev.dayDelta > 0).sort((a, b) => {
      if (a.dayDelta !== b.dayDelta) return a.dayDelta - b.dayDelta;
      return a.start - b.start;
    });

    let pick = current || futureToday[0] || futureDays[0];

    if (!pick) {
      nextClassLabel.textContent = 'Próxima clase';
      nextClassTitle.textContent = '—';
      nextClassMeta.textContent = 'No hay clases visibles';
      return;
    }

    if (current) {
      const remaining = pick.end - nowMinutes;

      nextClassLabel.textContent = 'Clase actual';
      nextClassTitle.textContent = pick.subject;
      nextClassMeta.textContent = `${dayLabel(pick.day)} · ${pick.startTime} – ${pick.endTime} · ${pick.type === 'LAB' ? 'LAB' : 'Clase'} · En curso · termina en ${fmtEndCountdown(remaining)}`;
      return;
    }

    let remaining;
    if (pick.dayDelta === 0) {
      const diffMinutes = pick.start - nowMinutes;
      remaining = fmtStartCountdown(diffMinutes);
    } else if (pick.dayDelta === 1) {
      remaining = `Mañana · ${pick.startTime}`;
    } else {
      remaining = `En ${pick.dayDelta} días`;
    }

    nextClassLabel.textContent = 'Próxima clase';
    nextClassTitle.textContent = pick.subject;
    nextClassMeta.textContent = `${dayLabel(pick.day)} · ${pick.startTime} – ${pick.endTime} · ${pick.type === 'LAB' ? 'LAB' : 'Clase'} · ${remaining}`;
  }

  function updateVisibleCount() {
    const visibleSubjects = subjects.filter(s => !state.hiddenSubjects.has(s.name) && (!state.query.trim() || s.name.toLowerCase().includes(state.query.trim().toLowerCase()))).length;
    visibleCount.textContent = `${visibleSubjects} visibles`;
  }

  function renderDayTotals() {
    dayTotals.innerHTML = '';
    const byDay = groupedSessions();

    DAYS.forEach(day => {
      const total = byDay[day.id].reduce((acc, ev) => acc + (toMinutes(ev.endTime) - toMinutes(ev.startTime)), 0) / 60;
      const row = document.createElement('div');
      row.className = 'day-total';
      row.innerHTML = `<strong>${day.label}</strong><span>${total.toFixed(1)} h</span>`;
      dayTotals.appendChild(row);
    });
  }

  function renderLegendState() {
    legend.querySelectorAll('.legend-item').forEach(el => {
      el.classList.toggle('off', state.hiddenSubjects.has(el.dataset.subject));
    });
  }

  function renderAll() {
    buildGrid();
    updateDayHighlights();
    renderLegendState();
    renderEvents();
    updateNowLine();
    nextClass();
    updateVisibleCount();
    renderDayTotals();
  }

  function loadState() {
    try {
      const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
      if (!saved) return;
      if (saved.theme === 'dark') document.body.classList.add('dark');
      state.theme = saved.theme || 'light';
      state.query = saved.query || '';
      state.hiddenSubjects = new Set(saved.hiddenSubjects || []);
    } catch (_) {}
  }

  function saveState() {
    localStorage.setItem(storageKey, JSON.stringify({
      theme: document.body.classList.contains('dark') ? 'dark' : 'light',
      query: search.value,
      hiddenSubjects: [...state.hiddenSubjects]
    }));
  }

  toggleThemeBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    state.theme = document.body.classList.contains('dark') ? 'dark' : 'light';
    toggleThemeBtn.textContent = document.body.classList.contains('dark') ? '☀ Modo' : '🌙 Modo';
    saveState();
  });

  centerTodayBtn.addEventListener('click', () => {
    const today = currentDayId();
    if (today && dayIndex(today) !== undefined) {
      const x = dayIndex(today) * parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--day-width'));
      scheduleWrap.scrollLeft = Math.max(0, x - 80);
    }
  });

  search.addEventListener('input', () => {
    state.query = search.value;
    renderAll();
    saveState();
  });

  loadState();
  search.value = state.query || '';
  toggleThemeBtn.textContent = document.body.classList.contains('dark') ? '☀ Modo' : '🌙 Modo';

  collectLegend();
  renderAll();
  saveState();

  setInterval(() => {
    updateNowLine();
    nextClass();
  }, 30 * 1000);

  window.addEventListener('resize', renderAll);
})();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    try {
      const registration = await navigator.serviceWorker.register("./service-worker.js");

      const updateBanner = document.getElementById("updateBanner");
      const updateBtn = document.getElementById("updateBtn");

      function showUpdateBanner() {
        updateBanner.style.display = "flex";
      }

      function hideUpdateBanner() {
        updateBanner.style.display = "none";
      }

      if (registration.waiting) {
        showUpdateBanner();
      }

      registration.addEventListener("updatefound", () => {
        const newWorker = registration.installing;
        if (!newWorker) return;

        newWorker.addEventListener("statechange", () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            showUpdateBanner();
          }
        });
      });

      updateBtn.addEventListener("click", () => {
        if (registration.waiting) {
          registration.waiting.postMessage({ type: "SKIP_WAITING" });
        }
      });

      navigator.serviceWorker.addEventListener("controllerchange", () => {
        window.location.reload();
      });

      registration.update();

      setInterval(() => {
        registration.update();
      }, 60000);

    } catch (err) {
      console.error("Error registrando el Service Worker:", err);
    }
  });
}
</script>
<div id="updateBanner" style="
  position: fixed;
  left: 16px;
  right: 16px;
  bottom: 16px;
  z-index: 9999;
  display: none;
  gap: 12px;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-radius: 16px;
  background: rgba(15,23,42,.96);
  color: white;
  box-shadow: 0 20px 50px rgba(0,0,0,.25);
  border: 1px solid rgba(255,255,255,.12);
">
  <div>
    <strong style="display:block; font-size:14px;">Hay una actualización disponible</strong>
    <span style="font-size:12px; opacity:.85;">Toca actualizar para cargar la versión nueva.</span>
  </div>
  <button id="updateBtn" style="
    border: none;
    border-radius: 12px;
    padding: 10px 14px;
    font-weight: 700;
    cursor: pointer;
    background: #ffffff;
    color: #0f172a;
  ">Actualizar</button>
</div>
